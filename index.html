<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高中英语绿宝书背词</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Lora', 'Georgia', 'serif'],
                        sans: ['Plus Jakarta Sans', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --paper-bg: #F5F2EB;
            --ink-black: #121212;
            --sage-green: #96B6B7;
            --soft-white: #FFFFFF;
            --oatmeal: #ECE7DF;
            --coral-rose: #ECA1A1;
            --soft-violet: #C1B4DF;
        }

        body {
            background-color: var(--paper-bg);
            color: var(--ink-black);
            min-height: 100vh;
            background-image: 
                radial-gradient(rgba(18, 18, 18, 0.03) 1px, transparent 0),
                radial-gradient(rgba(18, 18, 18, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }

        .ink-card {
            background: var(--soft-white);
            border: 3px solid var(--ink-black);
            border-radius: 20px;
            box-shadow: 4px 4px 0px 0px var(--ink-black);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ink-btn {
            border: 3px solid var(--ink-black);
            border-radius: 16px;
            box-shadow: 4px 4px 0px 0px var(--ink-black);
            transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .ink-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--ink-black);
        }
        .ink-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px var(--ink-black);
        }

        .wrong-book-banner {
            background-color: #E2CDBC;
            border: 3px solid var(--ink-black);
            border-radius: 20px;
            box-shadow: 4px 4px 0px 0px var(--ink-black);
        }

        .tab-btn.active {
            background-color: var(--sage-green);
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0px 0px var(--ink-black);
        }

        .ai-modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 3000; display: flex; align-items: flex-end; justify-content: center;
        }
        .ai-modal-content {
            background: rgba(255, 255, 255, 0.98);
            width: 100%; max-width: 600px;
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 24px 20px;
            max-height: 80vh; overflow-y: auto;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.15);
            border: 3px solid var(--ink-black);
            border-bottom: none;
        }
        .ai-close-btn {
            background: #f3f4f6; color: #4b5563; padding: 6px 14px; border-radius: 12px;
            border: 2px solid var(--ink-black); font-size: 0.9rem; font-weight: bold; cursor: pointer; float: right;
        }
        .ai-title { font-size: 1.25rem; font-weight: bold; color: #121212; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }
        .ai-body { font-size: 1rem; line-height: 1.6; color: #374151; margin-top: 10px; }
        .ai-spinner { display: inline-block; animation: spin 1s linear infinite; font-size: 1.2rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .shimmer-text { height: 14px; background: #e5e7eb; border-radius: 4px; margin-bottom: 12px; }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="font-sans antialiased pb-24">

    <!-- 顶栏：隐藏打卡天数，增加API设置按钮 -->
    <div class="max-w-[600px] mx-auto pt-6 px-4 flex justify-between items-center">
        <h1 class="font-serif text-2xl font-bold tracking-tight text-[#121212]">Explore vocabulary.</h1>
        <button onclick="openKeyModal()" class="border-2 border-[#121212] bg-[#ECE7DF] px-3.5 py-1.5 rounded-full font-bold text-xs shadow-[2px_2px_0px_0px_#121212] hover:translate-y-[-1px] active:translate-y-[1px] transition-transform flex items-center gap-1">
            🔑 AI 密钥设置
        </button>
    </div>

    <!-- 核心主体切换容器 -->
    <div class="container max-w-[600px] mx-auto px-4 mt-6">
        
        <!-- 【背单词标签页】 -->
        <div id="tab-vocab-view" class="space-y-6">
            <div id="view-dashboard" class="space-y-6">
                <!-- 生词本入口 -->
                <div class="wrong-book-banner p-5 flex justify-between items-center relative overflow-hidden cursor-pointer shadow-[4px_4px_0px_0px_#121212] transition-transform active:scale-98" onclick="startWrongBook()">
                    <div class="space-y-1.5 z-10 max-w-[70%]">
                        <h2 class="font-serif text-xl font-bold">生词本密室</h2>
                        <p class="text-xs text-[#555] font-medium leading-relaxed">回顾在背词中所有模糊的单词，击碎高考记忆瓶颈。</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="wrong-count" class="font-serif text-3xl font-extrabold border-2 border-[#121212] bg-[#FFF] px-3 py-1 rounded-xl shadow-[3px_3px_0px_0px_#121212]">0</span>
                        <svg class="w-14 h-14" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="35" stroke="#121212" stroke-width="4" fill="#96B6B7"/>
                            <circle cx="50" cy="50" r="22" stroke="#121212" stroke-width="4" fill="#ECA1A1"/>
                            <circle cx="50" cy="50" r="10" stroke="#121212" stroke-width="4" fill="#FFF"/>
                            <path d="M15 15L45 45" stroke="#121212" stroke-width="4" stroke-linecap="round"/>
                            <path d="M15 15H28M15 15V28" stroke="#121212" stroke-width="4" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>

                <!-- 关卡列表 -->
                <div class="list-grid grid grid-cols-2 gap-4" id="list-container"></div>
            </div>

            <!-- 背词卡片练习界面 -->
            <div id="view-learning" class="hidden">
                <div class="card-view flex flex-col justify-between space-y-6">
                    <div class="top-nav flex justify-between items-center">
                        <button onclick="goBack()" class="ink-btn bg-white px-4 py-2 font-bold text-sm">
                            &larr; 返回列表
                        </button>
                        <div class="border-2 border-[#121212] bg-[#ECE7DF] px-3 py-1.5 rounded-full font-bold text-xs" id="progress-indicator">
                            剩余: 0
                        </div>
                    </div>

                    <!-- 升级核心卡片容器：符合截图二结构 -->
                    <div class="word-card ink-card p-8 flex flex-col justify-center items-center min-h-[360px] relative bg-white">
                        <!-- 左上角 AI 记忆魔法 -->
                        <button class="absolute top-4 left-4 bg-[#C1B4DF] border-2 border-[#121212] px-3 py-1 rounded-full font-bold text-xs shadow-[2px_2px_0px_0px_#121212]" onclick="getAIMnemonic()">
                            ✨ 助记
                        </button>

                        <!-- 右上角 AI 串词美文 -->
                        <button id="btn-ai-story" class="absolute top-4 right-4 bg-[#96B6B7] border-2 border-[#121212] px-3 py-1 rounded-full font-bold text-xs shadow-[2px_2px_0px_0px_#121212]" onclick="generateAIStory()">
                            ✨ 美文
                        </button>

                        <!-- 主单词 -->
                        <div class="word-text font-serif text-5xl font-bold tracking-tight text-[#121212] mt-8" id="lbl-word">-</div>
                        
                        <!-- 音标发音徽章 -->
                        <div class="mt-4 border-2 border-[#121212] bg-[#ECE7DF] px-3.5 py-1.5 rounded-full font-bold text-xs text-[#444] cursor-pointer flex items-center gap-1" onclick="triggerAudio()">
                            <span id="lbl-phonetic">/ - /</span> 🔊
                        </div>

                        <!-- 记忆等级提示线 -->
                        <div class="text-xs text-gray-400 font-bold mt-2" id="lbl-review-round">记忆轮次: 1</div>

                        <!-- 隐藏的中文释义容器 -->
                        <div id="lbl-trans" class="word-trans hidden font-sans text-base mt-6 text-center text-[#333] px-4 leading-relaxed font-semibold italic border-t-2 border-dashed border-[#121212] pt-4 w-full">
                            -
                        </div>
                    </div>

                    <!-- 三大高阶交互操作按钮组 -->
                    <div class="flex flex-col space-y-3 w-full">
                        <button id="btn-show-trans" class="w-full ink-btn bg-[#ECE7DF] text-[#121212] py-3.5 font-bold text-sm" onclick="showTranslationOnly()">
                            🔍 显示释义
                        </button>
                        <div class="grid grid-cols-2 gap-4 w-full">
                            <button id="btn-forget" class="ink-btn bg-[#ECA1A1] text-[#121212] py-4 font-bold" onclick="handleNewAnswer(false)">
                                ✕ 不认识
                            </button>
                            <button id="btn-know" class="ink-btn bg-[#96B6B7] text-[#121212] py-4 font-bold" onclick="handleNewAnswer(true)">
                                ✓ 认识
                            </button>
                        </div>
                        <button id="btn-next" class="hidden w-full ink-btn bg-[#96B6B7] text-[#121212] py-4 font-bold" onclick="nextWord()">
                            下一个单词 &rarr;
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 【拼写测试独立标签页】 -->
        <div id="tab-spell-view" class="hidden space-y-6">
            <div class="ink-card p-6 min-h-[340px] flex flex-col justify-center items-center relative bg-white">
                <div class="font-serif text-2xl font-black text-center mb-2">拼写测试</div>
                <div id="spell-list-title" class="text-xs border border-black bg-gray-100 px-2 py-0.5 rounded font-bold text-gray-500 mb-6">请先在背单词页选择List开始</div>
                
                <!-- 中文提示意思 -->
                <div id="spell-chinese-prompt" class="font-sans text-lg font-bold text-center text-gray-700 px-4 mb-6 leading-relaxed">
                    等待开始...
                </div>

                <!-- 盲打盲拼输入框 -->
                <input type="text" id="spell-input" autocomplete="off" class="w-full border-3 border-black rounded-xl p-4 text-center text-xl font-mono font-bold focus:outline-none focus:bg-amber-50/40 mb-6 shadow-[3px_3px_0px_0px_#121212]" placeholder="在此键入英文单词...">

                <!-- 检查验证按钮 -->
                <button onclick="checkSpellingAnswer()" class="ink-btn bg-[#96B6B7] px-8 py-3 font-bold text-sm text-[#121212]">
                    检查答案
                </button>
            </div>
        </div>
    </div>

    <!-- 底部双标签复古全局导航栏 -->
    <div class="fixed bottom-0 left-0 right-0 max-w-[600px] mx-auto p-4 bg-[#F5F2EB]/90 backdrop-blur-sm z-[1000] border-t-3 border-black flex gap-4">
        <button id="nav-vocab" onclick="switchTab('vocab')" class="tab-btn active flex-1 border-3 border-black rounded-xl py-3 font-bold text-sm shadow-[3px_3px_0px_0px_#121212] transition-all flex justify-center items-center gap-2 bg-white">
            📖 背单词
        </button>
        <button id="nav-spell" onclick="switchTab('spell')" class="tab-btn flex-1 border-3 border-black rounded-xl py-3 font-bold text-sm shadow-[3px_3px_0px_0px_#121212] transition-all flex justify-center items-center gap-2 bg-white">
            ✏️ 拼写测试
        </button>
    </div>

    <!-- API Key 本地私密设置弹窗 -->
    <div id="key-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[4000] hidden items-center justify-center p-4">
        <div class="bg-white border-4 border-[#121212] rounded-3xl p-6 max-w-[440px] w-full shadow-[6px_6px_0px_0px_#121212]">
            <h3 class="font-serif text-xl font-black mb-2">🔑 Gemini API 密钥设置</h3>
            <p class="text-xs text-gray-500 font-medium leading-relaxed mb-4">请输入您的 Gemini API 密钥。密钥将安全加密存储在您的设备本地，绝不上传服务器。</p>
            <input type="password" id="input-api-key" class="w-full border-2 border-black rounded-xl p-3 mb-6 focus:outline-none focus:bg-amber-50/40 font-mono text-xs" placeholder="AIZA... 输入您的密钥">
            <div class="flex gap-4">
                <button onclick="closeKeyModal()" class="flex-1 ink-btn bg-[#ECE7DF] py-2.5 text-sm font-bold">取消</button>
                <button onclick="saveApiKey()" class="flex-1 ink-btn bg-[#96B6B7] py-2.5 text-sm font-bold">保存设置</button>
            </div>
        </div>
    </div>

    <!-- 自定义复古对话弹窗 -->
    <div id="custom-alert" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[5000] hidden items-center justify-center p-4">
        <div class="bg-white border-4 border-[#121212] rounded-3xl p-6 max-w-[420px] w-full shadow-[6px_6px_0px_0px_#121212]">
            <h3 class="font-serif text-xl font-black mb-3">提示 / Message</h3>
            <p id="custom-alert-msg" class="text-sm text-[#444] font-medium leading-relaxed mb-6"></p>
            <button onclick="closeCustomAlert()" class="w-full ink-btn bg-[#96B6B7] py-3 text-sm font-bold text-[#121212]">好的</button>
        </div>
    </div>

    <div id="custom-confirm" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[5000] hidden items-center justify-center p-4">
        <div class="bg-white border-4 border-[#121212] rounded-3xl p-6 max-w-[420px] w-full shadow-[6px_6px_0px_0px_#121212]">
            <h3 class="font-serif text-xl font-black mb-3">请确认 / Confirm</h3>
            <p id="custom-confirm-msg" class="text-sm text-[#444] font-medium leading-relaxed mb-6"></p>
            <div class="grid grid-cols-2 gap-4">
                <button id="custom-confirm-no" class="ink-btn bg-[#ECE7DF] py-3 text-sm font-bold text-[#121212]">取消</button>
                <button id="custom-confirm-yes" class="ink-btn bg-[#ECA1A1] py-3 text-sm font-bold text-[#121212]">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 代替原弹窗模拟器
        function callAlert(msg) {
            document.getElementById('custom-alert-msg').innerText = msg;
            const modal = document.getElementById('custom-alert');
            modal.classList.remove('hidden'); modal.classList.add('flex');
        }
        function closeCustomAlert() {
            const modal = document.getElementById('custom-alert');
            modal.classList.add('hidden'); modal.classList.remove('flex');
        }
        function callConfirm(msg, callback) {
            document.getElementById('custom-confirm-msg').innerText = msg;
            const modal = document.getElementById('custom-confirm');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            document.getElementById('custom-confirm-yes').onclick = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); callback(true); };
            document.getElementById('custom-confirm-no').onclick = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); callback(false); };
        }

        // 全局标签页切换控制
        let activeTab = 'vocab';
        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('nav-vocab').classList.remove('active');
            document.getElementById('nav-spell').classList.remove('active');
            document.getElementById('tab-vocab-view').classList.add('hidden');
            document.getElementById('tab-spell-view').classList.add('hidden');

            if (tab === 'vocab') {
                document.getElementById('nav-vocab').classList.add('active');
                document.getElementById('tab-vocab-view').classList.remove('hidden');
            } else {
                document.getElementById('nav-spell').classList.add('active');
                document.getElementById('tab-spell-view').classList.remove('hidden');
                initSpellingTest();
            }
        }

        // 密钥对话框交互控制
        function openKeyModal() {
            document.getElementById('input-api-key').value = Storage.get('green_book_gemini_key', '');
            const modal = document.getElementById('key-modal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
        }
        function closeKeyModal() {
            const modal = document.getElementById('key-modal');
            modal.classList.add('hidden'); modal.classList.remove('flex');
        }
        function saveApiKey() {
            const val = document.getElementById('input-api-key').value.trim();
            Storage.set('green_book_gemini_key', val);
            closeKeyModal();
            callAlert("🔑 API 密钥已安全加密存储在本地机器！");
        }

        const Storage = {
            get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } },
            set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
        };

        let progressData = Storage.get('green_book_progress', {}); 
        let wrongBook = Storage.get('green_book_wrongs', []); 
        let currentAccent = Storage.get('green_book_accent', 'en-US');

        let currentListNo = 0;
        let isWrongBookMode = false;
        let queue = []; 
        let wrongInRound = []; 
        let currentIdx = 0;
        let isAnswered = false;

        // 拼写测试业务状态机
        let spellQueue = [];
        let spellIdx = 0;
        function initSpellingTest() {
            const titleEl = document.getElementById('spell-list-title');
            const promptEl = document.getElementById('spell-chinese-prompt');
            const inputEl = document.getElementById('spell-input');
            inputEl.value = "";

            if (queue.length === 0) {
                titleEl.innerText = "全部 40 个单元随机漫游测试中";
                if (spellQueue.length === 0) {
                    spellQueue = [...WORDS_DATABASE].sort(() => Math.random() - 0.5);
                    spellIdx = 0;
                }
            } else {
                titleEl.innerText = isWrongBookMode ? "当前生词本测试模式" : `当前 List ${currentListNo} 测试模式`;
                spellQueue = [...queue]; 
            }

            if (spellIdx >= spellQueue.length) {
                spellIdx = 0;
                spellQueue.sort(() => Math.random() - 0.5);
            }

            const item = spellQueue[spellIdx];
            // 剥离音标提取纯中文
            let transText = item.translation.replace(/\[.*?\]/, '').trim();
            promptEl.innerText = transText;
            inputEl.focus();
        }

        function checkSpellingAnswer() {
            if (spellQueue.length === 0) return;
            const item = spellQueue[spellIdx];
            const inputEl = document.getElementById('spell-input');
            const userAns = inputEl.value.trim().toLowerCase();
            const correctAns = item.word.trim().toLowerCase();

            if (userAns === correctAns) {
                callAlert("🎯 拼写完全正确！非常好！");
                spellIdx++;
                initSpellingTest();
            } else {
                callAlert(`❌ 拼写有误。\n正确拼写是: 【 ${item.word} 】\n您的输入是: 【 ${userAns || "空"} 】`);
                if (!wrongBook.includes(item.id)) {
                    wrongBook.push(item.id);
                    Storage.set('green_book_wrongs', wrongBook);
                    document.getElementById('wrong-count').innerText = wrongBook.length;
                }
                spellIdx++;
                initSpellingTest();
            }
        }

        document.getElementById('spell-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkSpellingAnswer();
        });

        // 覆盖与升级背单词核心展示策略
        function showTranslationOnly() {
            document.getElementById('lbl-trans').classList.remove('hidden');
            document.getElementById('btn-show-trans').classList.add('hidden');
        }

        function handleNewAnswer(knows) {
            if (isAnswered) return;
            
            if (knows) {
                // 点击认识：直接记录并进入下一个
                isAnswered = true;
                processAnswerData(true);
                nextWord();
            } else {
                // 点击不认识：立刻展开释义，记录数据，隐藏选择按钮，显示下一个按钮
                isAnswered = true;
                processAnswerData(false);
                document.getElementById('lbl-trans').classList.remove('hidden');
                document.getElementById('btn-show-trans').classList.add('hidden');
                document.getElementById('btn-know').classList.add('hidden');
                document.getElementById('btn-forget').classList.add('hidden');
                document.getElementById('btn-next').classList.remove('hidden');
            }
        }

        function processAnswerData(knows) {
            const item = queue[currentIdx];
            if (knows) {
                if (!isWrongBookMode) {
                    if (!wrongInRound.includes(item.id)) {
                        if (!progressData[currentListNo]) progressData[currentListNo] = [];
                        if (!progressData[currentListNo].includes(item.id)) progressData[currentListNo].push(item.id);
                    }
                } else {
                    wrongBook = wrongBook.filter(id => id !== item.id);
                }
            } else {
                if (!wrongInRound.includes(item.id)) wrongInRound.push(item.id);
                if (!wrongBook.includes(item.id)) wrongBook.push(item.id);
            }
            Storage.set('green_book_progress', progressData);
            Storage.set('green_book_wrongs', wrongBook);
            checkStreak();
        }

        function checkStreak() {
            document.getElementById('wrong-count').innerText = wrongBook.length;
        }

        function toggleAccent() {
            currentAccent = currentAccent === 'en-US' ? 'en-GB' : 'en-US';
            Storage.set('green_book_accent', currentAccent);
            triggerAudio();
        }

        function triggerAudio() {
            if (queue.length === 0 || currentIdx >= queue.length) return;
            const word = queue[currentIdx].word;
            const synth = window.speechSynthesis;
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = currentAccent;
            synth.speak(utterance);
        }

        function renderDashboard() {
            checkStreak();
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= 40; i++) {
                const listWords = WORDS_DATABASE.filter(w => w.list_no === i);
                const total = listWords.length;
                if(total === 0) continue; 
                
                const mastered = (progressData[i] || []).length;
                const pct = Math.min(100, Math.floor((mastered / total) * 100));
                
                const card = document.createElement('div');
                card.className = 'ink-card p-5 cursor-pointer flex flex-col justify-between h-[150px] transition-transform active:scale-95';

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="font-serif text-lg font-bold">List ${i}</div>
                        <span class="text-xs font-bold border border-[#121212] px-2 py-0.5 rounded bg-[#ECE7DF]">${pct}%</span>
                    </div>
                    <div class="space-y-1.5">
                        <div class="progress-bar-bg border border-[#121212] bg-[#ECE7DF] h-3 rounded-full overflow-hidden">

            }
        }

        function startList(listNo) {
            isWrongBookMode = false;
            currentListNo = listNo;
            const allWords = WORDS_DATABASE.filter(w => w.list_no === listNo);
            const masteredIds = progressData[listNo] || [];
            queue = allWords.filter(w => !masteredIds.includes(w.id));
            if (queue.length === 0) {
                callConfirm(`List ${listNo} 的单词你已经全部掌握啦！是否要重新复习一遍？`, (confirmed) => {
                    if (confirmed) {
                        queue = [...allWords];
                        setupQueueAndStart();
                    }
                });
            } else {
                setupQueueAndStart();
            }
        }

        function setupQueueAndStart() {
            queue.sort(() => Math.random() - 0.5);
            wrongInRound = [];
            currentIdx = 0;
            showView(true);
            showCurrentWord();
        }

        function startWrongBook() {
            if (wrongBook.length === 0) { 
                callAlert('生词本空空如也，给孩子点个赞！'); 
                return; 
            }
            isWrongBookMode = true;
            queue = WORDS_DATABASE.filter(w => wrongBook.includes(w.id)).sort(() => Math.random() - 0.5);
            wrongInRound = [];
            currentIdx = 0;
            showView(true);
            showCurrentWord();
        }

        function showView(isLearning) {
            document.getElementById('view-dashboard').className = isLearning ? 'hidden' : '';
            document.getElementById('view-learning').className = isLearning ? '' : 'hidden';
        }

        function goBack() { showView(false); renderDashboard(); }

        function showCurrentWord() {
            if (currentIdx >= queue.length) {
                handleRoundEnd();
                return;
            }
            isAnswered = false;
            const item = queue[currentIdx];
            document.getElementById('lbl-word').innerText = item.word;
            
            let transText = item.translation;
            let phonetic = "/ 暂无音标 /";
            const pMatch = item.translation.match(/\[(.*?)\]/);
            if (pMatch) {
                phonetic = `/[${pMatch[1]}]/`;
                transText = item.translation.replace(/\[.*?\]/, '').trim();
            }
            document.getElementById('lbl-phonetic').innerText = phonetic;
            document.getElementById('lbl-trans').innerText = transText;
            
            // 重置UI状态
            document.getElementById('lbl-trans').classList.add('hidden');
            document.getElementById('btn-show-trans').classList.remove('hidden');
            document.getElementById('btn-know').classList.remove('hidden');
            document.getElementById('btn-forget').classList.remove('hidden');
            document.getElementById('btn-next').classList.add('hidden');

            document.getElementById('progress-indicator').innerText = `剩余: ${queue.length - currentIdx}`;
            
            setTimeout(triggerAudio, 100);
        }

        function nextWord() {
            currentIdx++;
            showCurrentWord();
        }

        function handleRoundEnd() {
            if (wrongInRound.length > 0) {
                callAlert(`第一轮结束！刚才有 ${wrongInRound.length} 个单词不熟，我们马上再练一遍！`);
                queue = WORDS_DATABASE.filter(w => wrongInRound.includes(w.id)).sort(() => Math.random() - 0.5);
                wrongInRound = [];
                currentIdx = 0;
                showCurrentWord();
            } else {
                if (isWrongBookMode) {
                    callAlert('🎉 太棒了，生词本里这批单词全部消灭！');
                } else {
                    callAlert('🎉 成功拿下今日任务！');
                }
                goBack();
            }
        }

        async function callGemini(prompt, systemPrompt) {
            const apiKey = Storage.get('green_book_gemini_key', '');
            if (!apiKey) {
                openKeyModal();
                throw new Error("请先设置您的 Gemini API 密钥。");
            }
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };
            const retryDelays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i <= 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP 状态异常: ${response.status}`);
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) return text;
                    throw new Error("API 未返回有效内容。");
                } catch (error) {
                    if (i === 5) throw new Error(`重试5次后失败: ${error.message}`);
                    await new Promise(resolve => setTimeout(resolve, retryDelays[i]));
                }
            }
        }

        // 解析 Markdown
        function formatMarkdown(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code style="background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #db2777;">$1</code>')
                .replace(/\n/g, '<br>');
        }

        function showAIModal(title, textContent, isLoading = false) {
            const existing = document.getElementById('ai-modal');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.id = 'ai-modal'; overlay.className = 'ai-modal-overlay';
            overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
            const content = document.createElement('div');
            content.className = 'ai-modal-content border-t-4 border-[#121212]';
            const closeBtn = document.createElement('button');
            closeBtn.className = 'ai-close-btn'; closeBtn.innerText = '关闭'; closeBtn.onclick = closeModal;
            content.appendChild(closeBtn);
            const modalTitle = document.createElement('div');
            modalTitle.className = 'ai-title font-serif'; modalTitle.innerHTML = title;
            content.appendChild(modalTitle);
            const body = document.createElement('div');
            body.className = 'ai-body';
            if (isLoading) {
                body.innerHTML = `<div style="color:#121212;font-size:0.95rem;margin-bottom:15px;"><span class="ai-spinner">🌀</span> <strong>AI 魔法正在施展中...</strong></div>`;
            } else {
                body.innerHTML = formatMarkdown(textContent);
            }
            content.appendChild(body); overlay.appendChild(content); document.body.appendChild(overlay);
        }
        function closeModal() { const modal = document.getElementById('ai-modal'); if (modal) modal.remove(); }

        async function getAIMnemonic() {
            if (queue.length === 0 || currentIdx >= queue.length) return;
            const item = queue[currentIdx];
            const title = `✨ ${item.word} 记忆魔法`;
            showAIModal(title, "", true);
            const prompt = `请为高考英语词汇 "${item.word}" 提供极简、高效的智能助记。该词常见翻译为："${item.translation}"。\n\n请包含以下板块：\n1. 🔮 记忆魔法：提供一个谐音联想、趣味故事、或词缀助记（不超过两句）。\n2. 📝 常考搭配：该词在高中常考的短语或句型（附中文）。\n3. 💡 高考真题语境：用该词造一个高考水平的实用英文句子（附中文翻译）。\n\n排版要求结构清晰，尽量精简，直击考点。`;
            const systemPrompt = "你是一位极受学生喜爱的超级高考英语名师。你精通词根词缀、谐音和高效的场景记忆。";
            try { const text = await callGemini(prompt, systemPrompt); showAIModal(title, text); } catch (error) { showAIModal(title, `❌ 失败: ${error.message}`); }
        }

        async function generateAIStory() {
            let pool = []; let title = "";
            if (isWrongBookMode) { pool = WORDS_DATABASE.filter(w => wrongBook.includes(w.id)); title = "✨ AI 生词消灭战美文"; }
            else { pool = WORDS_DATABASE.filter(w => w.list_no === currentListNo); title = `✨ List ${currentListNo} AI 情境美文`; }
            if (pool.length < 3) { callAlert("单词数量不足3个，无法组合成美文。"); return; }
            const selected = [...pool].sort(() => 0.5 - Math.random()).slice(0, Math.min(5, pool.length));
            showAIModal(title, "", true);
            const wordNames = selected.map(w => w.word);
            const prompt = `请使用以下 ${selected.length} 个英语核心单词，创作一篇贴近高中/高考难度、符合上下文语境的趣味短文（约80-120词）：\n${wordNames.join(', ')}\n\n要求：\n1. 短文内容应当生动有趣、富含正能量。\n2. 英文原文中将这些单词用**粗体**标出（格式为：**word**）。\n3. 附带优质地道的中文对照翻译。\n4. 在文章下方单独列出这几个词。`;
            const systemPrompt = "你是一位擅长用故事辅助词汇记忆的杰出英语教学大师。";
            try { const text = await callGemini(prompt, systemPrompt); showAIModal(title, text); } catch (error) { showAIModal(title, `❌ 失败: ${error.message}`); }
        }
