<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高中英语绿宝书背词</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Lora', 'Georgia', 'serif'],
                        sans: ['Plus Jakarta Sans', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --paper-bg: #F5F2EB;
            --ink-black: #121212;
            --sage-green: #96B6B7;
            --soft-white: #FFFFFF;
            --oatmeal: #ECE7DF;
            --coral-rose: #ECA1A1;
            --soft-violet: #C1B4DF;
        }

        body {
            background-color: var(--paper-bg);
            color: var(--ink-black);
            min-height: 100vh;
            background-image: 
                radial-gradient(rgba(18, 18, 18, 0.03) 1px, transparent 0),
                radial-gradient(rgba(18, 18, 18, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }

        /* 墨黑实体投影卡片样式 */
        .ink-card {
            background: var(--soft-white);
            border: 3px solid var(--ink-black);
            border-radius: 20px;
            box-shadow: 4px 4px 0px 0px var(--ink-black);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 实体投影按钮按压动效 */
        .ink-btn {
            border: 3px solid var(--ink-black);
            border-radius: 16px;
            box-shadow: 4px 4px 0px 0px var(--ink-black);
            transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .ink-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px var(--ink-black);
        }
        .ink-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px var(--ink-black);
        }

        .wrong-book-banner {
            background-color: #E2CDBC;
            border: 3px solid var(--ink-black);
            border-radius: 20px;
            box-shadow: 5px 5px 0px 0px var(--ink-black);
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="font-sans antialiased pb-12">

    <div class="max-w-[600px] mx-auto pt-6 px-4 flex justify-between items-center">
        <h1 class="font-serif text-2xl font-bold tracking-tight text-[#121212]">Explore vocabulary.</h1>
        <div id="streak-badge" class="border-2 border-[#121212] bg-[#ECE7DF] px-3.5 py-1.5 rounded-full font-bold text-xs shadow-[2px_2px_0px_0px_#121212]">
            🔥 打卡 0 天
        </div>
    </div>

    <div class="container max-w-[600px] mx-auto px-4 mt-6">
        <div id="view-dashboard" class="space-y-6">
            <!-- 仿 Explore topics 顶层广告推荐卡片（生词本） -->
            <div class="wrong-book-banner p-5 flex justify-between items-center relative overflow-hidden cursor-pointer shadow-[4px_4px_0px_0px_#121212] transition-transform active:scale-98" onclick="startWrongBook()">
                <div class="space-y-1.5 z-10 max-w-[70%]">
                    <h2 class="font-serif text-xl font-bold">生词本密室</h2>
                    <p class="text-xs text-[#555] font-medium leading-relaxed">回顾在背词中所有模糊的单词，击碎高考记忆瓶颈。</p>
                </div>
                <div class="flex items-center gap-2">
                    <span id="wrong-count" class="font-serif text-3xl font-extrabold border-2 border-[#121212] bg-[#FFF] px-3 py-1 rounded-xl shadow-[3px_3px_0px_0px_#121212]">0</span>
                    <!-- 靶心手绘矢量图 -->
                    <svg class="w-14 h-14" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="35" stroke="#121212" stroke-width="4" fill="#96B6B7"/>
                        <circle cx="50" cy="50" r="22" stroke="#121212" stroke-width="4" fill="#ECA1A1"/>
                        <circle cx="50" cy="50" r="10" stroke="#121212" stroke-width="4" fill="#FFF"/>
                        <path d="M15 15L45 45" stroke="#121212" stroke-width="4" stroke-linecap="round"/>
                        <path d="M15 15H28M15 15V28" stroke="#121212" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>

            <!-- 关卡列表 -->
            <div class="list-grid grid grid-cols-2 gap-4" id="list-container"></div>
        </div>

        <div id="view-learning" class="hidden">
            <div class="card-view flex flex-col min-height-[75vh] justify-between">
                <!-- 顶部简约导航栏 -->
                <div class="top-nav flex justify-between items-center mb-6">
                    <button onclick="goBack()" class="ink-btn bg-white px-4 py-2 font-bold text-sm flex items-center gap-2">
                        &larr; 返回
                    </button>
                    <!-- 进度指示胶囊 -->
                    <div class="border-2 border-[#121212] bg-[#ECE7DF] px-3 py-1.5 rounded-full font-bold text-xs" id="progress-indicator">
                        剩余: 0
                    </div>
                </div>

                <!-- 核心卡片容器：温暖纸质加深色实体投影 -->
                <div class="word-card ink-card p-8 flex flex-col justify-center items-center min-h-[380px] relative">
                    <!-- 顶角AI小喇叭 -->
                    <button id="btn-ai-story" class="absolute top-4 right-4 bg-[#C1B4DF] border-2 border-[#121212] px-3 py-1 rounded-full font-bold text-xs shadow-[2px_2px_0px_0px_#121212] hover:translate-y-[-1px] active:translate-y-[1px] transition-transform" onclick="generateAIStory()">
                        ✨ AI 串词美文
                    </button>

                    <!-- 主单词（艺术衬线体） -->
                    <div class="word-text font-serif text-5xl font-bold tracking-tight text-[#121212] select-text" id="lbl-word">-</div>
                    
                    <!-- 音标药丸徽章 -->
                    <div class="mt-4 border-2 border-[#121212] bg-[#ECE7DF] px-3.5 py-1.5 rounded-full font-bold text-sm text-[#444] cursor-pointer flex items-center gap-2" onclick="triggerAudio()">
                        <span id="lbl-phonetic">/ - /</span>
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M11 5L6 9H2V15H6L11 19V5Z" stroke="#121212" stroke-width="2.5" stroke-linejoin="round"/>
                            <path d="M15.54 8.46C16.4774 9.39766 17.0041 10.6692 17.0041 11.995C17.0041 13.3208 16.4774 14.5923 15.54 15.53M19.07 4.93C20.9449 6.80528 21.9984 9.34857 21.9984 12C21.9984 14.6514 20.9449 17.1947 19.07 19.07" stroke="#121212" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </div>

                    <!-- 翻译容器 -->
                    <div id="lbl-trans" class="word-trans hidden font-sans text-lg mt-8 text-center text-[#333] px-4 leading-relaxed font-semibold italic border-t-2 border-dashed border-[#121212] pt-6 w-full">
                        -
                    </div>

                    <!-- 悬浮型 AI 魔法按钮 -->
                    <div id="ai-magic-box" class="hidden mt-6" onclick="event.stopPropagation()">
                        <button class="ink-btn bg-[#C1B4DF] px-5 py-2.5 font-bold text-sm flex items-center gap-2" onclick="getAIMnemonic()">
                            ✨ 召唤 AI 助记魔法
                        </button>
                    </div>
                </div>

                <!-- 底部复古双色操作按钮 -->
                <div class="btn-group" id="group-action">
                    <button class="btn ink-btn bg-[#ECA1A1] text-[#121212] py-4" onclick="handleAnswer(false)">
                        ✍️ 不太确定
                    </button>
                    <button class="btn ink-btn bg-[#96B6B7] text-[#121212] py-4" onclick="handleAnswer(true)">
                        🎯 瞬间识记
                    </button>
                </div>
                <div class="btn-group hidden" id="group-next">
                    <button class="btn ink-btn bg-[#FFF] text-[#121212] py-4" onclick="nextWord()">
                        下一个单词 &rarr;
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 自定义复古对话弹窗（完美替代 alert 与 confirm，无广告无卡顿） -->
    <div id="custom-alert" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2000] hidden items-center justify-center p-4">
        <div class="bg-white border-4 border-[#121212] rounded-3xl p-6 max-w-[420px] w-full shadow-[6px_6px_0px_0px_#121212] transform scale-95 transition-transform duration-200">
            <h3 class="font-serif text-xl font-black mb-3">提示 / Message</h3>
            <p id="custom-alert-msg" class="text-sm text-[#444] font-medium leading-relaxed mb-6"></p>
            <button onclick="closeCustomAlert()" class="w-full ink-btn bg-[#96B6B7] py-3 text-sm font-bold text-[#121212]">
                好 的
            </button>
        </div>
    </div>

    <div id="custom-confirm" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2000] hidden items-center justify-center p-4">
        <div class="bg-white border-4 border-[#121212] rounded-3xl p-6 max-w-[420px] w-full shadow-[6px_6px_0px_0px_#121212] transform scale-95 transition-transform duration-200">
            <h3 class="font-serif text-xl font-black mb-3">请确认 / Confirm</h3>
            <p id="custom-confirm-msg" class="text-sm text-[#444] font-medium leading-relaxed mb-6"></p>
            <div class="grid grid-cols-2 gap-4">
                <button id="custom-confirm-no" class="ink-btn bg-[#ECE7DF] py-3 text-sm font-bold text-[#121212]">取消</button>
                <button id="custom-confirm-yes" class="ink-btn bg-[#ECA1A1] py-3 text-sm font-bold text-[#121212]">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 本地存取与核心状态封装
        const Storage = {
            get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } },
            set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
        };

        let progressData = Storage.get('green_book_progress', {}); // { list_no: [mastered_word_ids] }
        let wrongBook = Storage.get('green_book_wrongs', []); // [word_ids]
        let streak = Storage.get('green_book_streak', { count: 0, lastDate: '' });
        let currentAccent = Storage.get('green_book_accent', 'en-US'); // en-US or en-GB

        let currentListNo = 0;
        let isWrongBookMode = false;
        let queue = []; 
        let wrongInRound = []; 
        let currentIdx = 0;
        let isAnswered = false;

        // 代替 Alert 与 Confirm 的原生模拟器
        function callAlert(msg) {
            document.getElementById('custom-alert-msg').innerText = msg;
            const modal = document.getElementById('custom-alert');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeCustomAlert() {
            const modal = document.getElementById('custom-alert');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function callConfirm(msg, callback) {
            document.getElementById('custom-confirm-msg').innerText = msg;
            const modal = document.getElementById('custom-confirm');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            document.getElementById('custom-confirm-yes').onclick = () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                callback(true);
            };
            document.getElementById('custom-confirm-no').onclick = () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                callback(false);
            };
        }

        // 打卡逻辑维护
        function checkStreak() {
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            if (streak.lastDate === yesterday) {
                // 维持连击
            } else if (streak.lastDate !== today) {
                streak.count = 0; // 断签
            }
            document.getElementById('streak-badge').innerText = `🔥 打卡 ${streak.count} 天`;
            document.getElementById('wrong-count').innerText = wrongBook.length;
        }

        function triggerStreak() {
            const today = new Date().toISOString().split('T')[0];
            if (streak.lastDate !== today) {
                if (streak.lastDate === new Date(Date.now() - 86400000).toISOString().split('T')[0]) {
                    streak.count += 1;
                } else {
                    streak.count = 1;
                }
                streak.lastDate = today;
                Storage.set('green_book_streak', streak);
                callAlert(`🎉 成功拿下今日任务！打卡成功！已连续打卡 ${streak.count} 天！`);
                checkStreak();
            }
        }

        function toggleAccent() {
            currentAccent = currentAccent === 'en-US' ? 'en-GB' : 'en-US';
            Storage.set('green_book_accent', currentAccent);
            document.getElementById('audio-setting').innerText = currentAccent === 'en-US' ? '发音: 美音' : '发音: 英音';
            triggerAudio();
        }

        // 发音调用
        function triggerAudio() {
            if (queue.length === 0 || currentIdx >= queue.length) return;
            const word = queue[currentIdx].word;
            const synth = window.speechSynthesis;
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = currentAccent;
            synth.speak(utterance);
        }

        // 渲染主关卡界面
        function renderDashboard() {
            checkStreak();
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= 40; i++) {
                const listWords = WORDS_DATABASE.filter(w => w.list_no === i);
                const total = listWords.length;
                if(total === 0) continue; 
                
                const mastered = (progressData[i] || []).length;
                const pct = Math.min(100, Math.floor((mastered / total) * 100));
                
                const card = document.createElement('div');
                card.className = 'ink-card p-5 cursor-pointer flex flex-col justify-between h-[150px] transition-transform active:scale-95';
                card.onclick = () => startList(i);
                
                // 给卡片注入复古手绘小图标与百分比胶囊
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="font-serif text-lg font-bold">List ${i}</div>
                        <span class="text-xs font-bold border border-[#121212] px-2 py-0.5 rounded bg-[#ECE7DF]">${pct}%</span>
                    </div>
                    <div class="space-y-1.5">
                        <div class="progress-bar-bg border border-[#121212] bg-[#ECE7DF] h-3 rounded-full overflow-hidden">
                            <div class="progress-bar bg-[#96B6B7] h-full" style="width: ${pct}%"></div>
                        </div>
                        <div class="progress-text text-[11px] font-bold text-[#555] text-right">${mastered}/${total} 掌握</div>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        // 启动某单元学习
        function startList(listNo) {
            isWrongBookMode = false;
            currentListNo = listNo;
            const allWords = WORDS_DATABASE.filter(w => w.list_no === listNo);
            const masteredIds = progressData[listNo] || [];
            // 优先背不熟的词
            queue = allWords.filter(w => !masteredIds.includes(w.id));
            if (queue.length === 0) {
                callConfirm(`List ${listNo} 的单词你已经全部掌握啦！是否要重新复习一遍？`, (confirmed) => {
                    if (confirmed) {
                        queue = [...allWords];
                        setupQueueAndStart();
                    }
                });
            } else {
                setupQueueAndStart();
            }
        }

        function setupQueueAndStart() {
            // 打乱顺序
            queue.sort(() => Math.random() - 0.5);
            wrongInRound = [];
            currentIdx = 0;
            showView(true);
            showCurrentWord();
        }

        // 启动生词本复习
        function startWrongBook() {
            if (wrongBook.length === 0) { 
                callAlert('生词本空空如也，给孩子点个赞！'); 
                return; 
            }
            isWrongBookMode = true;
            queue = WORDS_DATABASE.filter(w => wrongBook.includes(w.id)).sort(() => Math.random() - 0.5);
            wrongInRound = [];
            currentIdx = 0;
            showView(true);
            showCurrentWord();
        }

        function showView(isLearning) {
            document.getElementById('view-dashboard').className = isLearning ? 'hidden' : '';
            document.getElementById('view-learning').className = isLearning ? '' : 'hidden';
        }

        function goBack() { showView(false); renderDashboard(); }

        // 核心显示词汇
        function showCurrentWord() {
            if (currentIdx >= queue.length) {
                handleRoundEnd();
                return;
            }
            isAnswered = false;
            const item = queue[currentIdx];
            document.getElementById('lbl-word').innerText = item.word;
            
            // 简单切分音标和释义
            let transText = item.translation;
            let phonetic = "/ 暂无音标 /";
            const pMatch = item.translation.match(/\[(.*?)\]/);
            if (pMatch) {
                phonetic = `/[${pMatch[1]}]/`;
                transText = item.translation.replace(/\[.*?\]/, '').trim();
            }
            document.getElementById('lbl-phonetic').innerText = phonetic;
            document.getElementById('lbl-trans').innerText = transText;
            document.getElementById('lbl-trans').className = 'word-trans hidden';
            
            // 初始化隐藏 AI 助记盒子
            document.getElementById('ai-magic-box').className = 'hidden';

            document.getElementById('group-action').className = 'btn-group';
            document.getElementById('group-next').className = 'btn-group hidden';
            document.getElementById('progress-indicator').innerText = `剩余: ${queue.length - currentIdx}`;
            
            // 自动发音
            setTimeout(triggerAudio, 100);
        }

        // 回答结果判定
        function handleAnswer(knows) {
            if (isAnswered) return;
            isAnswered = true;
            const item = queue[currentIdx];
            document.getElementById('lbl-trans').className = 'word-trans';
            document.getElementById('group-action').className = 'btn-group hidden';
            document.getElementById('group-next').className = 'btn-group';
            
            // 答案揭晓后，显示 AI 记忆魔法按钮
            document.getElementById('ai-magic-box').className = '';

            if (knows) {
                if (!isWrongBookMode) {
                    if (!wrongInRound.includes(item.id)) {
                        if (!progressData[currentListNo]) progressData[currentListNo] = [];
                        if (!progressData[currentListNo].includes(item.id)) progressData[currentListNo].push(item.id);
                    }
                } else {
                    // 生词本模式下如果认识了，从生词本移除
                    wrongBook = wrongBook.filter(id => id !== item.id);
                }
            } else {
                // 不认识
                if (!wrongInRound.includes(item.id)) wrongInRound.push(item.id);
                if (!wrongBook.includes(item.id)) wrongBook.push(item.id);
            }
            Storage.set('green_book_progress', progressData);
            Storage.set('green_book_wrongs', wrongBook);
        }

        function nextWord() {
            currentIdx++;
            showCurrentWord();
        }

        // 本轮刷完处理（错词重连算法）
        function handleRoundEnd() {
            if (wrongInRound.length > 0) {
                callAlert(`第一轮结束！刚才有 ${wrongInRound.length} 个单词不熟，我们马上再练一遍！`);
                queue = WORDS_DATABASE.filter(w => wrongInRound.includes(w.id)).sort(() => Math.random() - 0.5);
                wrongInRound = [];
                currentIdx = 0;
                showCurrentWord();
            } else {
                if (isWrongBookMode) {
                    callAlert('🎉 太棒了，生词本里这批单词全部消灭！');
                } else {
                    triggerStreak();
                }
                goBack();
            }
        }

        // ==========================================
        // 🔮 ✨ AI 智能接口集成（Gemini LLM）
        // ==========================================
        
        async function callGemini(prompt, systemPrompt) {
            const apiKey = ""; // 运行时环境自动提供 Key
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };
            
            const retryDelays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i <= 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP状态异常: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        return text;
                    }
                    throw new Error("API未返回任何文本内容。");
                } catch (error) {
                    if (i === 5) {
                        throw new Error(`连接Gemini失败。已重试5次。详情: ${error.message}`);
                    }
                    await new Promise(resolve => setTimeout(resolve, retryDelays[i]));
                }
            }
        }

        // 解析 Markdown 常用标记为 HTML
        function formatMarkdown(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code style="background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #db2777;">$1</code>')
                .replace(/\n/g, '<br>');
        }

        // 显示 AI 极致复古抽屉模态框
        function showAIModal(title, textContent, isLoading = false) {
            const existing = document.getElementById('ai-modal');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'ai-modal';
            overlay.className = 'ai-modal-overlay';
            overlay.onclick = (e) => {
                if (e.target === overlay) closeModal();
            };

            const content = document.createElement('div');
            content.className = 'ai-modal-content border-t-4 border-[#121212]';

            const closeBtn = document.createElement('button');
            closeBtn.className = 'ai-close-btn border-2 border-[#121212] font-bold shadow-[2px_2px_0px_0px_#121212] active:translate-y-[1px] active:shadow-[1px_1px_0px_0px_#121212]';
            closeBtn.innerText = '关闭';
            closeBtn.onclick = closeModal;
            content.appendChild(closeBtn);

            const modalTitle = document.createElement('div');
            modalTitle.className = 'ai-title font-serif';

        async function generateAIStory() {
            let pool = [];
            let title = "";
            if (isWrongBookMode) {
                pool = WORDS_DATABASE.filter(w => wrongBook.includes(w.id));
                title = "✨ AI 生词消灭战美文";
            } else {
                pool = WORDS_DATABASE.filter(w => w.list_no === currentListNo);
                title = `✨ List ${currentListNo} AI 情境美文`;
            }

            if (pool.length < 3) {
                callAlert("当前词库中单词不足 3 个，无法组合成美文。多积累一些生词，或者回到普通单元试试吧！");
                return;
            }

            const shuffled = [...pool].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, Math.min(5, pool.length));
            
            showAIModal(title, "", true);
            
            const wordNames = selected.map(w => w.word);
            const prompt = `请使用以下 ${selected.length} 个英语核心单词，创作一篇贴近高中/高考难度、符合上下文语境的趣味短文（约80-120词）：\n${wordNames.join(', ')}\n\n要求：\n1. 短文内容应当生动有趣、富含热能、或有科学常识。\n2. 英文原文中将这 ${selected.length} 个单词用**粗体**标出（格式为：**word**）。\n3. 附带优质地道的中文对照翻译。\n4. 在文章下方单独列出这几个词，并附带你在文章中使用的词性与含义。`;
            const systemPrompt = "你是一位擅长用故事辅助词汇记忆的杰出英语教学大师，专门为高中生定制科学、易读且充满语境感的短篇阅读材料。";

            try {
                const text = await callGemini(prompt, systemPrompt);
                showAIModal(title, text);
            } catch (error) {
                showAIModal(title, `❌ 魔法施放失败，请检查网络或稍后重试。\n错误原因: ${error.message}`);
            }
        }
