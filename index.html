<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高中英语绿宝书背词</title>
    <style>
        :root {
            --primary: #2f80ed;
            --success: #27ae60;
            --danger: #eb5757;
            --bg: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.75);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            background-attachment: fixed;
            color: #1f2937;
            min-height: 100vh;
            padding-bottom: 60px;
        }
        .header {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 1.2rem; font-weight: 600; color: #4f46e5; }
        .stats-badge { background: #4f46e5; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .hidden { display: none !important; }
        
        /* 单元选择界面 */
        .list-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .list-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px; padding: 15px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: transform 0.2s;
        }
        .list-card:active { transform: scale(0.98); }
        .list-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; }
        .progress-bar-bg { background: rgba(0,0,0,0.05); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
        .progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 0.75rem; color: #6b7280; text-align: right; }
        .wrong-book-btn {
            grid-column: span 2; background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            color: white; padding: 16px; border-radius: 16px; text-align: center; font-weight: bold; margin-bottom: 10px; box-shadow: 0 4px 12px rgba(225,29,72,0.3);
        }

        /* 背词核心界面 */
        .card-view { display: flex; flex-direction: column; min-height: 70vh; justify-content: space-between; }
        .word-card {
            background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 24px;
            padding: 40px 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 250px;
        }
        .word-text { font-size: 2.4rem; font-weight: 700; color: #1e1b4b; margin-bottom: 8px; letter-spacing: -0.5px; }
        .word-audio { font-size: 1.1rem; color: var(--primary); margin-bottom: 25px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .word-trans { font-size: 1.3rem; color: #374151; font-weight: 500; background: rgba(255,255,255,0.5); padding: 12px 20px; border-radius: 12px; margin-top: 10px; width: 100%; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn {
            padding: 16px; border-radius: 16px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: background 0.2s, transform 0.1s; display: flex; justify-content: center; align-items: center;
        }
        .btn:active { transform: scale(0.97); }
        .btn-know { background: #22c55e; color: white; box-shadow: 0 4px 12px rgba(34,197,94,0.2); }
        .btn-forget { background: #ef4444; color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.2); }
        .btn-next { background: var(--primary); color: white; grid-column: span 2; box-shadow: 0 4px 12px rgba(47,128,237,0.2); }
        .btn-accent { background: rgba(255,255,255,0.8); color: #4f46e5; border: 1px solid rgba(79,70,229,0.2); }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; }
        .back-btn { font-size: 1rem; color: #4f46e5; cursor: pointer; font-weight: 500; }
        .round-indicator { font-size: 0.85rem; color: #6b7280; background: rgba(0,0,0,0.04); padding: 4px 10px; border-radius: 12px; }
        .audio-toggle { font-size: 0.85rem; color: #4f46e5; cursor: pointer; border: 1px solid #4f46e5; padding: 2px 8px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="app-title">高中英语绿宝书</h1>
        <div id="streak-badge" class="stats-badge">🔥 连续打卡 0 天</div>
    </div>

    <div class="container">
        <div id="view-dashboard">
            <div class="wrong-book-btn" onclick="startWrongBook()">📕 生词本密室 (<span id="wrong-count">0</span> 词)</div>
            <div class="list-grid" id="list-container"></div>
        </div>

        <div id="view-learning" class="hidden">
            <div class="card-view">
                <div class="top-nav">
                    <div class="back-btn" onclick="goBack()">&larr; 返回主页</div>
                    <div id="audio-setting" class="audio-toggle" onclick="toggleAccent()">发音: 美音</div>
                    <div class="round-indicator" id="progress-indicator">剩余: 0</div>
                </div>
                
                <div class="word-card" onclick="triggerAudio()">
                    <div class="word-text" id="lbl-word">-</div>
                    <div class="word-audio">🔊 <span id="lbl-phonetic">/ - /</span></div>
                    <div id="lbl-trans" class="word-trans hidden">-</div>
                </div>

                <div class="btn-group" id="group-action">
                    <button class="btn btn-forget" onclick="handleAnswer(false)">不认识</button>
                    <button class="btn btn-know" onclick="handleAnswer(true)">认识</button>
                </div>
                <div class="btn-group hidden" id="group-next">
                    <button class="btn btn-next" onclick="nextWord()">下一个</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 本地存取与核心状态封装
        const Storage = {
            get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } },
            set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
        };

        let progressData = Storage.get('green_book_progress', {}); // { list_no: [mastered_word_ids] }
        let wrongBook = Storage.get('green_book_wrongs', []); // [word_ids]
        let streak = Storage.get('green_book_streak', { count: 0, lastDate: '' });
        let currentAccent = Storage.get('green_book_accent', 'en-US'); // en-US or en-GB

        let currentListNo = 0;
        let isWrongBookMode = false;
        let queue = []; 
        let wrongInRound = []; 
        let currentIdx = 0;
        let isAnswered = false;

        // 打卡逻辑维护
        function checkStreak() {
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            if (streak.lastDate === yesterday) {
                // 维持连击
            } else if (streak.lastDate !== today) {
                streak.count = 0; // 断签
            }
            document.getElementById('streak-badge').innerText = `🔥 连续打卡 ${streak.count} 天`;
            document.getElementById('wrong-count').innerText = wrongBook.length;
        }

        function triggerStreak() {
            const today = new Date().toISOString().split('T')[0];
            if (streak.lastDate !== today) {
                if (streak.lastDate === new Date(Date.now() - 86400000).toISOString().split('T')[0]) {
                    streak.count += 1;
                } else {
                    streak.count = 1;
                }
                streak.lastDate = today;
                Storage.set('green_book_streak', streak);
                alert(`🎉 成功拿下今日任务！打卡成功！已连续打卡 ${streak.count} 天！`);
                checkStreak();
            }
        }

        function toggleAccent() {
            currentAccent = currentAccent === 'en-US' ? 'en-GB' : 'en-US';
            Storage.set('green_book_accent', currentAccent);
            document.getElementById('audio-setting').innerText = currentAccent === 'en-US' ? '发音: 美音' : '发音: 英音';
            triggerAudio();
        }

        // 发音调用
        function triggerAudio() {
            if (queue.length === 0 || currentIdx >= queue.length) return;
            const word = queue[currentIdx].word;
            const synth = window.speechSynthesis;
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = currentAccent;
            synth.speak(utterance);
        }

        // 渲染主关卡界面
        function renderDashboard() {
            checkStreak();
            document.getElementById('audio-setting').innerText = currentAccent === 'en-US' ? '发音: 美音' : '发音: 英音';
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= 40; i++) {
                const listWords = WORDS_DATABASE.filter(w => w.list_no === i);
                const total = listWords.length;
                if(total === 0) continue; // 兼容分段加载
                
                const mastered = (progressData[i] || []).length;
                const pct = Math.min(100, Math.floor((mastered / total) * 100));
                
                const card = document.createElement('div');
                card.className = 'list-card';
                card.onclick = () => startList(i);
                card.innerHTML = `
                    <div class="list-title">单元 List ${i}</div>
                    <div class="progress-bar-bg"><div class="progress-bar" style="width: ${pct}%"></div></div>
                    <div class="progress-text">${mastered}/${total} 熟练</div>
                `;
                container.appendChild(card);
            }
        }

        // 启动某单元学习
        function startList(listNo) {
            isWrongBookMode = false;
            currentListNo = listNo;
            const allWords = WORDS_DATABASE.filter(w => w.list_no === listNo);
            const masteredIds = progressData[listNo] || [];
            // 优先背不熟的词
            queue = allWords.filter(w => !masteredIds.includes(w.id));
            if (queue.length === 0) {
                if (confirm(`List ${listNo} 的单词你已经全部掌握啦！是否要重新复习一遍？`)) {
                    queue = [...allWords];
                } else { return; }
            }
            // 打乱顺序
            queue.sort(() => Math.random() - 0.5);
            wrongInRound = [];
            currentIdx = 0;
            showView(true);
            showCurrentWord();
        }

        // 启动生词本复习
        function startWrongBook() {
            if (wrongBook.length === 0) { alert('生词本空空如也，给孩子点个赞！'); return; }
            isWrongBookMode = true;
            queue = WORDS_DATABASE.filter(w => wrongBook.includes(w.id)).sort(() => Math.random() - 0.5);
            wrongInRound = [];
            currentIdx = 0;
            showView(true);
            showCurrentWord();
        }

        function showView(isLearning) {
            document.getElementById('view-dashboard').className = isLearning ? 'hidden' : '';
            document.getElementById('view-learning').className = isLearning ? '' : 'hidden';
        }

        function goBack() { showView(false); renderDashboard(); }

        // 核心显示词汇
        function showCurrentWord() {
            if (currentIdx >= queue.length) {
                handleRoundEnd();
                return;
            }
            isAnswered = false;
            const item = queue[currentIdx];
            document.getElementById('lbl-word').innerText = item.word;
            
            // 简单切分音标和释义
            let transText = item.translation;
            let phonetic = "/ 暂无音标 /";
            const pMatch = item.translation.match(/\[(.*?)\]/);
            if (pMatch) {
                phonetic = `/[${pMatch[1]}]/`;
                transText = item.translation.replace(/\[.*?\]/, '').trim();
            }
            document.getElementById('lbl-phonetic').innerText = phonetic;
            document.getElementById('lbl-trans').innerText = transText;
            document.getElementById('lbl-trans').className = 'word-trans hidden';
            
            document.getElementById('group-action').className = 'btn-group';
            document.getElementById('group-next').className = 'btn-group hidden';
            document.getElementById('progress-indicator').innerText = `剩余: ${queue.length - currentIdx}`;
            
            // 自动发音
            setTimeout(triggerAudio, 100);
        }

        // 回答结果判定
        function handleAnswer(knows) {
            if (isAnswered) return;
            isAnswered = true;
            const item = queue[currentIdx];
            document.getElementById('lbl-trans').className = 'word-trans';
            document.getElementById('group-action').className = 'btn-group hidden';
            document.getElementById('group-next').className = 'btn-group';

            if (knows) {
                if (!isWrongBookMode) {
                    if (!wrongInRound.includes(item.id)) {
                        if (!progressData[currentListNo]) progressData[currentListNo] = [];
                        if (!progressData[currentListNo].includes(item.id)) progressData[currentListNo].push(item.id);
                    }
                } else {
                    // 生词本模式下如果认识了，从生词本移除
                    wrongBook = wrongBook.filter(id => id !== item.id);
                }
            } else {
                // 不认识
                if (!wrongInRound.includes(item.id)) wrongInRound.push(item.id);
                if (!wrongBook.includes(item.id)) wrongBook.push(item.id);
            }
            Storage.set('green_book_progress', progressData);
            Storage.set('green_book_wrongs', wrongBook);
        }

        function nextWord() {
            currentIdx++;
            showCurrentWord();
        }

        // 本轮刷完处理（错词重连算法）
        function handleRoundEnd() {
            if (wrongInRound.length > 0) {
                alert(`第一轮结束！刚才有 ${wrongInRound.length} 个单词不熟，我们马上再练一遍！`);
                queue = WORDS_DATABASE.filter(w => wrongInRound.includes(w.id)).sort(() => Math.random() - 0.5);
                wrongInRound = [];
                currentIdx = 0;
                showCurrentWord();
            } else {
                if (isWrongBookMode) {
                    alert('🎉 太棒了，生词本里这批单词全部消灭！');
                } else {
                    triggerStreak();
                }
                goBack();
            }
        }
    </script>
</body>
